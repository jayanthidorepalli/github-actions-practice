name: Java CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Get your code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Install Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Build project
    - name: Build with Maven
      run: mvn clean install -DskipTests
